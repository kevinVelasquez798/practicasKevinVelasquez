<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  
  <!-- IMPORTANTE para que funcione responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Grid Bootstrap</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .caja {
      background-color: lightblue;
      border: 1px solid black;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row">

    <div class="col-12 col-sm-6 col-md-4 col-lg-2 caja">Caja 1</div>
    <div class="col-12 col-sm-6 col-md-4 col-lg-2 caja">Caja 2</div>

    <div class="col-12 col-sm-2 col-md-4 col-lg-2 caja">Caja 3</div>
    <div class="col-12 col-sm-2 col-md-4 col-lg-2 caja">Caja 4</div>
    <div class="col-12 col-sm-2 col-md-4 col-lg-2 caja">Caja 5</div>
    <div class="col-12 col-sm-2 col-md-4 col-lg-2 caja">Caja 6</div>

  </div>
</div>

</body>
</html>
